{% extends 'base.html' %}

{% block content %}
<h1 class="display-4">User Profile</h1>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <a class="navbar-brand" href="#">Notes app</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
    <div class="navbar-nav">
      <a class="nav-item nav-link active" href="/home/">Home <span class="sr-only">(current)</span></a>
      <a class="nav-item nav-link" href="/register/">Register</a>
      <a class="nav-item nav-link" href="/login/">Login</a>
      <a class="nav-item nav-link" href="/">Main page</a>
    </div>
  </div>
</nav>

<div class="card mt-3 mb-4" style="width: 28rem;">
  <div class="card-body">
    <h5 class="card-title">Username: {{ user['username'] }}</h5>
    <p class="card-text">You have {{ notes_num }} note{% if notes_num != 1 %}s{% endif %}.</p>
    <a href="{{ url_for('home') }}" class="btn btn-primary">Back to Notes</a>
  </div>
</div>

{% endblock %}
