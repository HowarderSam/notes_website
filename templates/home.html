{% extends  'base.html' %}

{%block content%}

<h1 class='display-3'>{% block title %}Your notes{% endblock%}</h1>



{% if session.get('user_id') %}
<form action="{{ url_for('logout') }}" method="get" style="display:inline;">
    <button type="submit" class="btn btn-outline-danger float-end">Logout</button>
</form>
{% endif %}


{% if session.get('user_id') %}
  <a href="{{ url_for('profile') }}" class="btn btn-outline-info me-2">Profile</a>
{% endif %}


<form method="POST">
    <input type="text" name="content" placeholder="Text">
    <button type="submit" class="btn btn-outline-primary">Add</button>
</form>


    {% for note in notes %}
    <div class="col-md-4 mb-3">
      <div class="card h-100" style="width: 18rem;">
        <div class="card-body">
          <h5 class="card-title">Note Nº {{ loop.index }} </h5>
          <p class="card-text note-text">
            {{ note['content']}}
          </p>
          
          <form action="{{ url_for('edit_note', note_id=note['id']) }}" method="POST" class="edit-form" style="display:none;">
            <textarea name="content" class="form-control mb-2">{{ note['content'] }}</textarea>
            <button type="submit" class="btn btn-success btn-sm">Save</button>
          </form>
            <button class="btn btn-outline-secondary btn-sm edit-btn">Edit</button>


          <form action="{{ url_for('delete_notes', note_id= note['id'])}}" method="POST">
            <button type="submit" class="btn btn-outline-danger">Delete</button>
          </form>
        </div>
      </div>
    </div>



    {% endfor %}


    </div>
</div>


<script src="{{ url_for('static', filename='js/notes.js') }}"></script>
